name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Handle Gradle Wrapper and Compile
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          elif [ -f "app/gradlew" ]; then
            chmod +x app/gradlew
            cd app && ./gradlew assembleDebug --no-daemon
          else
            echo "Gradle wrapper missing, generating fresh native system wrapper..."
            gradle wrapper
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyMate-Debug-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
